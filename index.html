<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Presentación</title>
    <link rel="stylesheet" href="./style/output.css">
</head>

<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center">
    <header class="mb-8">
        <h1 class="text-4xl font-bold text-gray-800 mb-2">Bienvenido a la Barbería</h1>
        <p class="text-lg text-gray-600">Conoce nuestros servicios y equipo</p>
    </header>
    <main class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-5xl px-4">
        <!-- Card 1 -->
        <div class="bg-white rounded-lg shadow-lg p-6 flex flex-col items-center">
            <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Barbero 1"
                class="w-24 h-24 rounded-full mb-4">
            <h2 class="text-xl font-semibold text-gray-800 mb-2">Juan Pérez</h2>
            <p class="text-gray-600 mb-4">Especialista en cortes modernos y clásicos.</p>
            <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Ver perfil</button>
        </div>
        <!-- Card 2 -->
        <div class="bg-white rounded-lg shadow-lg p-6 flex flex-col items-center">
            <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="Barbera 2"
                class="w-24 h-24 rounded-full mb-4">
            <h2 class="text-xl font-semibold text-gray-800 mb-2">María López</h2>
            <p class="text-gray-600 mb-4">Experta en barbería y cuidado de la barba.</p>
            <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Ver perfil</button>
        </div>
        <!-- Card 3 -->
        <div class="bg-white rounded-lg shadow-lg p-6 flex flex-col items-center">
            <img src="https://randomuser.me/api/portraits/men/65.jpg" alt="Barbero 3"
                class="w-24 h-24 rounded-full mb-4">
            <h2 class="text-xl font-semibold text-gray-800 mb-2">Carlos Ruiz</h2>
            <p class="text-gray-600 mb-4">Cortes, afeitados y asesoría de imagen.</p>
            <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Ver perfil</button>
        </div>
    </main>
    <footer class="mt-12 text-gray-500">&copy; 2026 Barbería. Todos los derechos reservados.</footer>
</body>

</html>
